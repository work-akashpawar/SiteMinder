<template>
    <lightning-card title={accountName} icon-name="standard:account">
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error Message -->
        <template if:true={error}>
            <div class="slds-m-around_medium">
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <h2>{error}</h2>
                </div>
            </div>
        </template>

        <!-- Main Content -->
        <template if:false={isLoading}>
            <div class="slds-p-around_medium">
                
                <!-- Contacts Section -->
                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title slds-theme_shade">
                        <span class="slds-truncate slds-p-horizontal_small" title="Contacts">
                            <lightning-icon icon-name="standard:contact" size="small" class="slds-m-right_x-small"></lightning-icon>
                            Contacts
                        </span>
                    </h3>
                    <div class="slds-section__content slds-p-around_medium">
                        <template if:true={hasContacts}>
                            <lightning-datatable
                                key-field="Id"
                                data={contacts}
                                columns={contactColumns}
                                onsave={handleContactSave}
                                draft-values={draftValues}
                                hide-checkbox-column
                                data-id="contactTable"
                                class="slds-m-bottom_medium">
                            </lightning-datatable>
                            <div class="slds-text-body_small slds-text-color_weak">
                                <lightning-icon icon-name="utility:edit" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                Click on Email or Phone cells to edit inline
                            </div>
                        </template>
                        <template if:false={hasContacts}>
                            <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_x-small"></lightning-icon>
                                {noContactsMessage}
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Opportunities Section -->
                <div class="slds-section slds-is-open slds-m-top_large">
                    <h3 class="slds-section__title slds-theme_shade">
                        <span class="slds-truncate slds-p-horizontal_small" title="Opportunities">
                            <lightning-icon icon-name="standard:opportunity" size="small" class="slds-m-right_x-small"></lightning-icon>
                            Opportunities
                        </span>
                    </h3>
                    <div class="slds-section__content slds-p-around_medium">
                        
                        <!-- Stage Filter Input -->
                        <div class="slds-m-bottom_medium">
                            <lightning-input
                                type="search"
                                label="Filter by Stage"
                                value={stageFilter}
                                onchange={handleStageFilterChange}
                                placeholder="Enter stage name (e.g., Prospecting, Closed Won)"
                                class="filter-input">
                            </lightning-input>
                        </div>

                        <!-- Opportunity Count -->
                        <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            {opportunityCountMessage}
                        </div>

                        <!-- Opportunities Datatable -->
                        <template if:true={hasOpportunities}>
                            <lightning-datatable
                                key-field="Id"
                                data={filteredOpportunities}
                                columns={opportunityColumns}
                                hide-checkbox-column
                                data-id="opportunityTable">
                            </lightning-datatable>
                        </template>
                        <template if:false={hasOpportunities}>
                            <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_x-small"></lightning-icon>
                                {noOpportunitiesMessage}
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </template>
    </lightning-card>
</template>
